  n=1. 단 trigger(코드 읽는 sub-agent의 raw 텍스트 합류)·symptom(400 no low surrogate)·failure(턴 중단+중간유실)이
  구체적이고 재현 메커니즘이 명확. sprint-pm/dev-cycle처럼 sub-agent를 병렬 호출하는 오케스트레이터 스킬에서 재발 가능.
  동일 trigger 재발 시(또는 verify/code-review 다중 에이전트에서 동형 발생) weak/moderate 승급.

