lesson_id: l_2026_06_22_w_subagent_surrogate_serialization_break
category: collab_antipattern
title: "코드베이스를 읽는 병렬 sub-agent의 raw 텍스트 출력에 섞인 짝없는 surrogate 문자가, 결과를 합쳐 만든 다음 API 요청 본문을 깨뜨려 오케스트레이션 턴 전체를 중단"
created_at: "2026-06-22"
updated_at: "2026-06-22"

# === Sources ===
sources:
  - run_id: sprint-pm/sp_2026_06_22_conv_ownership (Phase 3·4 — PM/Architect 병렬 평가)
    file_ref: "이전 세션 트랜스크립트 f25b7b4b...jsonl line 964-965(Agent 병렬 호출) → line 989(에러)"
    quote: |
      Phase 3·4에서 PM agent와 Architect agent를 한 메시지로 병렬 호출(Agent ×2). PM은 정상 반환(line 967),
      Architect는 코드베이스(schema/service 등)를 Read/Grep해 raw 텍스트 yaml을 반환. 두 결과를 합쳐
      다음 모델 호출 본문을 직렬화할 때 짝없는(lone) surrogate 문자가 섞여:
        "API Error: 400 The request body is not valid JSON: no low surrogate in string: line 1 column 450309"
      턴 전체가 중단. gh issue create(#38/#39)는 이미 성공했고, 깨진 건 그 다음 모델 호출이라
      "이슈는 생겼는데 plan은 미완"인 중간 유실 상태로 남음.
    observed_at: "2026-06-22"

n_cycles: 1

# === Pattern ===
pattern:
  trigger: "메인(orchestrator)이 코드베이스를 Read/Grep해 raw 텍스트(코드 스니펫·주석 인용 포함)를 반환하는 sub-agent를 1개 이상 호출하고, 그 출력을 합쳐 다음 API 요청 본문으로 직렬화. 코드/주석에 이모지·장식기호 등 surrogate-pair 문자가 있거나 출력이 4바이트 문자 경계에서 잘리면 lone surrogate 발생."
  symptom: "다음 모델 호출이 `API Error 400 ... no low surrogate in string: line 1 column N`으로 거부. sub-agent 자체는 성공 반환했는데도 그 결과를 *합치는* 단계에서 깨짐 → 어느 도구도 실패로 안 보이고 턴만 죽음."
  failure_mode: "오케스트레이션 턴 전체 중단 + 중간 산출 유실(예: 이슈는 생성됐으나 milestone/plan 미완). 부분 성공한 sub-agent 결과(PM 평가)도 다음 호출이 죽어 활용 못 하고 날아갈 뻔함. 사용자에게는 '왜 멈췄는지' 불명확."

# === Seed Taxonomy 매칭 ===
seed_taxonomy_match: ""   # 기존 3종(silent_skip/weak_check/intent_drift) 미매칭. 새 코드 후보: subagent_output_serialization_break (병렬 sub-agent raw 출력의 인코딩이 합류 단계에서 요청을 깨뜨림). W의 기존 정의(자기봉합/self-pass)와는 다른 '오케스트레이션 도구 실패'축 — 카테고리 적합도는 약함, 후크 가치로 기록.

