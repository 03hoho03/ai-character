  - "재실행 프롬프트에 인코딩 가드 추가: '응답은 한글+ASCII만, 이모지·특수 유니코드·surrogate 문자 금지, 코드의 특수문자는 [emoji] 같은 ASCII 플레이스홀더로 대체'. 재실행은 정상 완료."

# === Proposed Patch ===
proposed_patch:
  target: "next_goal_context"   # n=1이라 skill 파일 직접수정 대신 컨텍스트 큐 (confidence_gate 준수)
  kind: "text_change"
  diff_hint: |
    코드베이스를 읽어 raw 텍스트를 반환하는 sub-agent(특히 병렬 다수)를 호출하는 오케스트레이터(sprint-pm Phase 3·4,
    dev-cycle Explore/verify 등)는:
    (1) sub-agent 프롬프트에 인코딩 가드 명시 — "한글+ASCII만, 이모지·surrogate 문자 출력 금지, 코드의 특수문자는
        ASCII 플레이스홀더로". 또는 가능하면 structured output(schema)으로 raw 코드 인용을 최소화.
