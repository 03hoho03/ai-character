lesson_id: l_2026_06_20_y_identity_change_state_invalidation_gap
category: define_weakness
title: "소유 식별자/컨텍스트를 바꾸는 변경이, 그 식별자에 묶인 2차 상태(메모이즈 캐시·테스트 Provider 하네스)의 무효화를 미열거 — '자격만 주입하면 끝' 가정"
created_at: "2026-06-20"
updated_at: "2026-06-24"

# === Sources ===
sources:
  - run_id: dev-cycle/2026_06_20_session-credential-carry (비정식 — 회고, #36)
    file_ref: "apps/web/src/lib/character-store.ts#reloadUserCharacters / session-context.tsx login·logout"
    quote: |
      #36 성공 기준 "로그인 사용자 요청이 세션 자격을 운반하고 내 캐릭터가 계정 기준 노출"을
      'fetch에 credentials:include 주입'만으로 충족된다고 가정. 그러나 character-store는 load-once
      싱글톤(loadPromise 가드)이라, 로그인 후에도 익명 browserId로 채워진 캐시를 계속 노출(stale).
      구현 도중 발견 — reloadUserCharacters()(load 가드 해제+재fetch)를 추가하고 login/signup/logout에
      배선해야 '계정 기준 노출'의 둘째 절이 실제로 성립.
    observed_at: "2026-06-20"
  - run_id: dev-cycle/2026_06_20_auth-ui-session (비정식 — 회고, #35)
    file_ref: "apps/web/src/app/page.spec.tsx (회귀 수정) / app/page.tsx에 SessionStatus 주입"
    quote: |
      #35에서 Home 헤더에 SessionStatus(useSession 소비)를 주입하자, 기존 page.spec(Home을 Provider
      없이 render)이 'useSession은 SessionProvider 내부에서만' throw로 깨짐. 신규 auth 테스트는 GREEN인데
      기존 화면 렌더 테스트가 RED. page.spec을 SessionProvider 래핑 + auth-api 모킹으로 회귀 수정.
    observed_at: "2026-06-20"

n_cycles: 1   # 약점 발생은 #35/#36 동일 사이클. (source 2건은 같은 사이클의 두 표면 — 런타임 캐시 / 테스트 하네스)

# === Pattern ===
pattern:
  trigger: "소유 식별자(browserId↔userId)나 전역 컨텍스트(SessionProvider)를 도입/전환하는 변경. 그 식별자·컨텍스트에 *이미 묶여 있는 상태*가 존재함 — load-once 메모이즈 싱글톤 캐시, 또는 기존 화면을 Provider 없이 렌더하던 테스트 하네스."
  symptom: "변경을 '자격 운반(credentials 주입) / 컴포넌트 추가'만으로 끝났다고 보고, 2차 상태 무효화를 미열거. (a) 런타임: 로그인 후에도 옛 식별자 캐시가 stale 노출 → 캐시 무효화 누락. (b) 테스트: 컨텍스트 소비 컴포넌트를 공유 화면에 주입하니 그 화면의 기존 렌더 테스트가 Provider 부재로 throw → 회귀."
  failure_mode: "성공 기준의 둘째 절('계정 기준 노출')이 메커니즘(credentials)만으론 미충족 — 도중 발견해 보강 안 했으면 로그인 직후 익명 데이터 노출 버그. 동시에 기존 테스트 스위트가 RED로 떨어져 '신규는 GREEN'이 회귀를 가림."

# === Seed Taxonomy 매칭 ===
seed_taxonomy_match: ""   # 기존 3종 미매칭. 새 코드 후보: second_order_state_invalidation (식별자/컨텍스트 변경의 2차 상태 의존)

confidence: tentative
confidence_reason: |
  n=1 사이클(#35/#36). 단 같은 사이클 안에서 2개 독립 표면(런타임 stale 캐시 / 테스트 Provider 회귀)이
  동일 메타패턴('식별자·컨텍스트 변경 → 그에 묶인 2차 상태 무효화 미열거')을 입증해 within-cycle 신호는 강함.
  매트릭스상 n_cycles=1이라 tentative 유지. 다음에 새 컨텍스트/캐시 도입(예: #33 클레임 시 대화 캐시 재소유,
  #34 유니크키 전환 후 get-or-create 캐시) 사이클에서 동일 trigger+symptom 재발 시 weak/moderate 승급.

counter_evidence:
  - run_id: dev-cycle/2026_06_23_conv-ownercontext (#40) + dev-cycle/2026_06_24_conv-inbox-ui (#42)
    file_ref: "apps/api/test/conversations.service.spec.ts (#40 하네스) / apps/web/src/app/conversations/conversation-inbox.tsx (#42 page-local)"
    note: |
      재발 추적 지점(#33/#34/#38 계열)에서 *준수*. (1) #40: 소유 식별자(browserId→OwnerContext) 전환의
      테스트 2차 상태를 열거 — conversations.service.spec 하네스를 owner 객체({browserId}|{userId})로 갱신,
      ownerWhere 키를 내용 단언(식별자 변경이 테스트 Provider/입력 하네스 무효화를 요구함을 처리).
      (2) #42: '소유자별 파생 상태(인박스 목록)'를 **load-once 캐시 대신 page-local fetch(영속 캐시 부재)**로 구현 —
      useEffect [status, user?.id] 의존으로 세션 전환 시 자동 재로드. 사용자가 전역 store(character-store식)와
      page-local 중 후자를 명시 선택. *2차 상태(캐시) 자체를 만들지 않아* stale 무효화 문제를 원천 제거.
      반증 아님(약점 실재) — 완화책이 작동하고, 더 나아가 '캐시를 안 만드는' 우회까지 확장된 긍정 증거.
    observed_at: "2026-06-24"

# === Proposed Patch ===
proposed_patch:
  target: "next_goal_context"
  kind: "text_change"
  diff_hint: |
    소유 식별자/전역 컨텍스트를 도입·전환하는 티켓의 failure_modes에 "이 식별자·컨텍스트에 이미 묶인
    2차 상태" 점검을 의무화: (1) 런타임 — load-once/메모이즈 캐시(싱글톤 store, useSyncExternalStore,
    SWR 키)가 옛 식별자로 채워져 있나? 있으면 전환점에 무효화+재로드 배선. (2) 테스트 — Provider 소비
    컴포넌트를 공유 화면에 주입하면, 그 화면을 render하는 기존 spec을 grep해 wrapper 갱신을 같은 PR에 포함.
    성공 기준이 '자격 운반 + X 노출'처럼 2절이면, 둘째 절(노출/반영)이 메커니즘만으론 성립하지 않을 수 있음을 의심.
  applied: false
  applied_at: ""
  applied_by: ""

applies_to_next_goal:
  - "다음 dev-cycle: 식별자/컨텍스트 변경 티켓 PRD failure_modes에 '옛 식별자에 묶인 2차 상태(캐시·테스트 하네스) 무효화' 항목"
  - "전역 Provider 소비 컴포넌트를 기존 화면에 주입할 때: 그 화면의 기존 *.spec을 grep → Provider 래핑/모킹 갱신 동반(별도 회귀)"
  - "성공 기준이 'A 운반 + B 노출' 2절이면 B를 독립 점검 — 메커니즘(A)이 상태 갱신(B)을 자동 보장한다고 가정 금지"
  - "**완화 메뉴 확장(#42)**: 소유자별 파생 상태를 새로 만들 때, load-once 전역 캐시+명시 무효화 대신 *page-local fresh fetch(영속 캐시 부재, 세션 식별자 의존 useEffect)*를 우선 고려 — 단일 화면 소비면 캐시 자체를 안 만드는 게 stale을 원천 차단(가장 단순·안전). 전역 공유가 진짜 필요할 때만 store+무효화."
  - "준수 확인됨: #33(클레임 후 캐시 순서 무효화), #40(테스트 하네스 OwnerContext 갱신), #42(page-local). 다음 캐시/컨텍스트 도입 티켓에서 계속 추적"

remaining_ambiguity:
  - "캐시 무효화의 입도 — character-store는 전체 reload로 충분했으나, 대화별/키별 캐시(#33/#34)는 부분 무효화가 필요할 수 있어 'reload 한 방' 일반화가 과할지 미정."
  - "테스트 하네스 회귀를 '사전 grep'으로 잡을지 'CI 전체 스위트 실행'으로 잡을지 — 이번엔 전체 vitest 실행이 즉시 적발(89→회귀2). 사전 grep은 보강책이지 필수는 아닐 수 있음."

