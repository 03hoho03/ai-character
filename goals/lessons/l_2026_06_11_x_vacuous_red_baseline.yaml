lesson_id: l_2026_06_11_x_vacuous_red_baseline
category: verifier_weakness
title: "그린필드에서 재귀 러너(pnpm -r) 기반 검증은 패키지 0개일 때 공허하게 PASS — RED 베이스라인 오염"
created_at: "2026-06-11"
updated_at: "2026-06-11"

sources:
  - run_id: dev-cycle/2026_06_11_monorepo-scaffold (비정식 — verify_report 기반 회고)
    file_ref: "dev-cycle/2026_06_11_monorepo-scaffold/verify_report.md#phase-2-note"
    quote: |
      대신 PRD 성공 기준 5개를 `scripts/verify-scaffold.sh`로 인코딩 — 실행 가능한 검증으로 대체.
      작성 직후 실행 결과: **RED (전 항목 FAIL — 구현 전이므로 정상)**.
      (실제 RED 실행 로그에는 "PASS: pnpm -r typecheck" / "PASS: pnpm -r build"가 포함 —
      workspace 패키지 0개 상태에서 재귀 러너가 공허 통과. 메인이 같은 실행 안에서 발견해
      존재 체크를 보강했으나, 보강 전 스크립트 그대로였다면 GREEN 판정의 2/5가 무의미했음)
    observed_at: "2026-06-11"

n_cycles: 1

pattern:
  trigger: "그린필드/스캐폴딩 ticket에서 test-first 검증 스크립트가 재귀 러너(pnpm -r, turbo run 등)로 기준을 측정할 때"
  symptom: "구현 전 RED 실행인데 일부 기준이 PASS로 출력 (대상 0개 → 러너가 성공 종료)"
  failure_mode: "RED 베이스라인의 신뢰성 — '구현 전엔 실패해야 정상' 검증이 해당 기준들에 한해 무력화 (이번 케이스 5개 중 2개)"

