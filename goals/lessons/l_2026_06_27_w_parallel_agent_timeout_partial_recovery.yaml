# 회고 모드. source = 본 세션 Agent 결과 + worktree git 상태 관측.
sources:
  - run_id: "sp_2026_06_27_story_mode / #50 delta 검증 (worktree 에이전트)"
    file_ref: "본 세션 Agent 결과: 'API Error: Stream idle timeout - partial response received', subagent_tokens 0, tool_uses 36"
    quote: |
      #50 에이전트가 최대위험 티켓에서 36 tool_use 후 스트림 idle 타임아웃 — 최종 응답 유실(tokens 0).
      worktree git status 확인 결과 RED 테스트 2개(story-runtime.spec.ts, story-sessions-turn.http.spec.ts)는
      작성됐고 controller/service/story-runtime.ts 구현은 미시작(Phase 2 RED에서 끊김).
      메인이 드래프트 테스트를 채택(품질 양호 — __proto__ 오염·NaN/Infinity 거부·clamp 경계 단언)하고
      직접 구현 완성 → 독립 verify PASS.
    observed_at: "2026-06-27"

n_cycles: 1

pattern:
  trigger: "병렬 worktree 에이전트가 큰/고위험 티켓에서 장시간 실행(다수 tool_use)"
  symptom: "'Stream idle timeout - partial response received' + subagent_tokens 0(최종 응답 유실). 그러나 worktree 작업트리에는 부분 산출이 커밋 전 상태로 잔존 — 이 경우 Phase 2 RED 테스트 파일은 쓰였고 구현만 미시작"
  failure_mode: "타임아웃을 '티켓 실패=전량 폐기'로 오인하면 쓸 만한 부분 산출(특히 신뢰경계 엣지를 잘 짠 RED 테스트)을 버림. 또는 죽은 에이전트를 SendMessage로 무리하게 재개하려다 컨텍스트 유실 악화"

seed_taxonomy_match: ""   # 신규 코드 후보: agent_turn_interruption_recovery

