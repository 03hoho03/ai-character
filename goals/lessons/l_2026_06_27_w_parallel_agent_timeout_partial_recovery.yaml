counter_evidence: []

proposed_patch:
  target: "next_goal_context"
  kind: "text_change"
  diff_hint: |
    병렬 에이전트가 타임아웃/에러로 최종 응답을 못 줄 때 복구 절차:
    1) 죽었다 단정 말고 worktree(.claude/worktrees/agent-* 또는 feat/* 브랜치) git status로 부분 산출 확인.
    2) RED 테스트만 있고 구현 미시작이면 — 테스트 품질 검토 후 채택, 메인이 직접 구현 완성
       (특히 고위험 티켓은 메인 인수가 오히려 신중함 확보에 유리).
    3) SendMessage 재개는 컨텍스트가 살아있고 단순 이어쓰기일 때만; 구현 전체가 남았으면 인수가 안전.
    4) 인수 후에도 독립 verify는 동일하게 수행(인수했다고 검증 생략 금지).
