# === Proposed Patch ===
proposed_patch:
  target: "next_goal_context"
  kind: "text_change"
  diff_hint: |
    스키마를 '토대 + 전환'으로 분할할 때, 토대 티켓 PRD에 "후속 전환 티켓이 요구할 제약" 점검을
    포함: 추가하는 컬럼만이 아니라 *기존 컬럼의 제약 방향*(예: 다른 소유 식별자가 nullable이어야
    하는가, unique 키가 어디로 옮겨가는가)을 토대 단계에서 답한다. "이 스키마 위에서 다음 티켓이
    추가 마이그레이션 없이 진행되는가"를 토대 verify의 자문 항목으로.
  applied: false
  applied_at: ""
  applied_by: ""

applies_to_next_goal:
  - "다음 dev-cycle: 스키마를 분할할 때 토대 PRD에 '후속 티켓이 요구할 제약(NOT NULL 완화/unique 방향/FK)' 섹션을 넣고 점검"
  - "토대 마이그레이션 verify: '이 스키마로 다음 전환 티켓이 막힘없이 진행되나' 자문 — 막히면 토대 범위에 포함"
  - "특히 #34(유니크키 (browserId,personaId)→(userId,personaId) 전환)에서 동일 함정 재발 추적"

remaining_ambiguity:
  - "토대 티켓에서 후속 제약을 어디까지 선반영할지 — 과하면 YAGNI(미사용 nullable 컬럼). 이번 browserId nullable은 후속에 명백히 필요했던 케이스라 선반영이 옳았으나, 일반화 시 '명백히 필요'의 경계가 모호."

