# === 강제 게이트: out_of_scope ≥ 2 ===
out_of_scope:
  - "익명 데이터 클레임/머지(29c #33) + 유니크키 전환(29d #34) + 프론트 클레임 트리거(30c #37) — MVP-thin 경계 밖. browserId가 FK 없는 평문 + usr-<uuid> 클라제공 id 직행이라 클레임은 신규 매핑 로직, 유니크키 교체는 클레임과 순서의존(중복대화 마이그레이션 깨짐). 로그인 코어 검증 후 별도 cycle."
  - "성인 등급별 safetySettings 차등 집행 + 성인 캐릭터 비소유자 채팅 접근 게이트 — 인증이 선결이지만 안전/정책 테마. 연령 인증·정책 결정 선행 필요. 인증 자리잡은 뒤 별도 안전 sprint."
  - "비밀번호 재설정·이메일 인증메일·OAuth 다중 공급자 — 인증 MVP 이후. d1(#27)에서 단일 방식만 결정."
  - "17c 인기 랭킹(#17 잔여) — Conversation.personaId FK 부재 선결. 발견 테마, 별도 cycle."
  - "#20 멀티모달(대화→이미지) — 비용·모델·저장소 스파이크 선행. 그린필드 외부 의존."
  - "#22 사용자 기억 직접 편집 — summary 단일 String 모델 불일치. 무관 테마."

