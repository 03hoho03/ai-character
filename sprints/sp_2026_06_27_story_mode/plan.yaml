sprint:
  id: sp_2026_06_27_story_mode
  milestone_number: 6
  goal: >
    크랙 스토리 모드(인터랙티브 픽션)의 핵심 루프(제작→플레이→스탯 변화→엔딩 달성)를
    MVP로 완결한다 — 스토리·시작설정·스탯·엔딩 + delta 엔진/임계값 평가, 서버 재조립 신뢰경계 준수.
  length: open
  execution: dependency-lane-parallel
  design_doc: docs/story-mode-design.md

locked_decisions:
  - 스탯 갱신: 모델이 Gemini structured output으로 delta 출력 (서버 검증 후 적용)
  - 엔딩 조건: 스탯 임계값 규칙(condition Json [{stat,op,value}] AND), 서버 결정론 평가
  - 스키마: Stat=정규화 테이블 / Ending.condition=Json / StorySession.statValues=Json / dev예시·추천답변·shortcuts=Json
  - MVP 범위: 다중 StartSetting + 전체 PATCH 포함 (사용자 break — 좁히지 않음)
  - 신뢰경계: 서버 재조립(buildStoryPrompt) + delta 서버검증 (CLAUDE.md #23)

